apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chatwoot-postgres
  namespace: chatwoot
spec:
  serviceName: chatwoot-postgres
  replicas: 1
  selector:
    matchLabels:
      app: chatwoot-postgres
  template:
    metadata:
      labels:
        app: chatwoot-postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "chatwoot_production"
        - name: POSTGRES_USER
          value: "chatwoot_prod"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chatwoot-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - chatwoot_prod
            - -d
            - chatwoot_production
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - chatwoot_prod
            - -d
            - chatwoot_production
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot-postgres
  namespace: chatwoot
spec:
  selector:
    app: chatwoot-postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None