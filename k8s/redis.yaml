apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chatwoot-redis
  namespace: chatwoot
spec:
  serviceName: chatwoot-redis
  replicas: 1
  selector:
    matchLabels:
      app: chatwoot-redis
  template:
    metadata:
      labels:
        app: chatwoot-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
        command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chatwoot-secrets
              key: REDIS_PASSWORD
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - "$REDIS_PASSWORD"
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - "$REDIS_PASSWORD"
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: redis-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chatwoot-redis
  namespace: chatwoot
spec:
  selector:
    app: chatwoot-redis
  ports:
  - port: 6379
    targetPort: 6379
  clusterIP: None