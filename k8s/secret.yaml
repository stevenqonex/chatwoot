apiVersion: v1
kind: Secret
metadata:
  name: chatwoot-secrets
  namespace: chatwoot
type: Opaque
data:
  # Generate these values using: echo -n "your-secret" | base64
  SECRET_KEY_BASE: "REPLACE_WITH_BASE64_ENCODED_SECRET_KEY_BASE"
  POSTGRES_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_DB_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_REDIS_PASSWORD"
  
  # Email credentials
  SMTP_USERNAME: "REPLACE_WITH_BASE64_ENCODED_SMTP_USERNAME"
  SMTP_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_SMTP_PASSWORD"
  SMTP_DOMAIN: "REPLACE_WITH_BASE64_ENCODED_SMTP_DOMAIN"
  
  # Optional: Cloud storage credentials
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_BASE64_ENCODED_AWS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_BASE64_ENCODED_AWS_SECRET_KEY"
  AWS_REGION: "REPLACE_WITH_BASE64_ENCODED_AWS_REGION"
  S3_BUCKET_NAME: "REPLACE_WITH_BASE64_ENCODED_S3_BUCKET"
  
  # Optional: Third-party integrations
  TWILIO_AUTH_TOKEN: "REPLACE_WITH_BASE64_ENCODED_TWILIO_TOKEN"
  TWILIO_ACCOUNT_SID: "REPLACE_WITH_BASE64_ENCODED_TWILIO_SID"
  FACEBOOK_APP_SECRET: "REPLACE_WITH_BASE64_ENCODED_FACEBOOK_SECRET"
  
  # Optional: Monitoring
  SENTRY_DSN: "REPLACE_WITH_BASE64_ENCODED_SENTRY_DSN"